server {
    listen 80;
    server_name example.com www.example.com;

    root /var/www/html;
    index index.html index.htm index.php;

    # 1. Block Bad Bots
    if ($is_bad_bot) {
        return 444;
    }

    # 2. Block Invalid Methods
    if ($is_invalid_method) {
        return 405; # "Method Not Allowed" is more standard than 444 here
    }

    # 3. Block Bad Characters (Still use 'if' as it's a one-off URI check)
    if ($request_uri ~* "[\x00-\x1F\x7F-\xFF]") {
        return 444;
    }

    # Block PHP in uploads
    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Block sensitive files
    location ~* /(wp-config.php|\.env) {
        deny all;
    }

    # Static files caching
    location ~* ^/wp-(content|includes)/.+\.(png|jpg|jpeg|gif|webp)$ {
        try_files $uri$webp_suffix $uri =404;
        expires 365d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        log_not_found off;
    }

    location ~* ^/wp-(content|includes)/.+\.(js|css|ico|svg|woff|woff2|otf|xml)$ {
        expires 365d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        log_not_found off;
    }

    # Main routing
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    client_max_body_size 20M;


    # Rank Math sitemap rewrites
    rewrite ^/sitemap_index.xml$ /index.php?sitemap=1 last;
    rewrite ^/([^/]+?)-sitemap([0-9]+)?.xml$ /index.php?sitemap=$1&sitemap_n=$2 last;

    # PHP handling
    location ~ \.php$ {
        try_files $uri =404; # Prevent processing non-existent PHP files
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # Performance
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 60;
        
        # Fix for Traefik/SSL
        fastcgi_param HTTPS on;
    }

    # Block .htaccess
    location ~ /\.ht {
        deny all;
    }

    # Disable xmlrpc
    location = /xmlrpc.php {
        deny all;
    }
}
