server {
    listen 80;
    server_name example.com www.example.com;

    root /var/www/html;
    index index.html index.htm index.php;

    # Block invalid methods
    if ($request_method !~ ^(GET|POST|HEAD|PUT|DELETE|OPTIONS|PATCH)$) {
        return 444;
    }

    # Block bad characters
    if ($request_uri ~* "[\x00-\x1F\x7F-\xFF]") {
        return 444;
    }

    # Block PHP in uploads (CRITICAL)
    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
    }

    # Block bad bots
    if ($http_user_agent ~* (masscan|nmap|nikto|sqlmap|acunetix|dirbuster|gobuster)) {
        return 444;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Block sensitive files
    location ~* /(wp-config.php|\.env) {
        deny all;
    }

    # Static files caching
    location ~* ^/wp-(content|includes)/.+\.(png|jpg|jpeg|gif|webp)$ {
        try_files $uri$webp_suffix $uri =404;
        expires 365d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        log_not_found off;
    }

    location ~* ^/wp-(content|includes)/.+\.(js|css|ico|svg|woff|woff2|otf|xml)$ {
        expires 365d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        log_not_found off;
    }

    # Main routing
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    client_max_body_size 20M;


    # Rank Math sitemap rewrites
    rewrite ^/sitemap_index.xml$ /index.php?sitemap=1 last;
    rewrite ^/([^/]+?)-sitemap([0-9]+)?.xml$ /index.php?sitemap=$1&sitemap_n=$2 last;

    # PHP handling (important)
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 60;
    }

    # Block .htaccess
    location ~ /\.ht {
        deny all;
    }

    # Disable xmlrpc
    location = /xmlrpc.php {
        deny all;
    }
}
