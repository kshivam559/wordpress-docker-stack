user nginx;
worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Block Bad Bots
    map $http_user_agent $is_bad_bot {
        default 0;
        "~*masscan|nmap|nikto|sqlmap|acunetix" 1;
        "~*dirbuster|gobuster" 1;
    }

    # Block Invalid Methods (Whitelisting only safe ones)
    map $request_method $is_invalid_method {
        default 1;
        GET 0;
        POST 0;
        HEAD 0;
        PUT 0;
        DELETE 0;
        OPTIONS 0;
        PATCH 0;
    }

    # WebP support detection
    map $http_accept $webp_suffix {
        default "";
        "~*webp" ".webp";
    }

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging (keep lean)
    access_log off;
    error_log /var/log/nginx/error.log warn;

    # Gzip
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/font-woff2
        application/xml
        application/xml+rss
        image/svg+xml;

    
    # File cache (important)
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    include /etc/nginx/conf.d/*.conf;
}