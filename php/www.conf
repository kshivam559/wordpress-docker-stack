[www]

user = www-data
group = www-data

listen = 9000

pm = dynamic
pm.max_children = 8
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 500

; Below 2GB RAM, use 'ondemand' to save resources
; pm = ondemand
; pm.max_children = 8
; pm.process_idle_timeout = 10s
; pm.max_requests = 500

access.log = /dev/null

php_admin_flag[log_errors] = on
php_admin_value[error_log] = /proc/self/fd/2
php_admin_value[error_reporting] = E_ALL & ~E_NOTICE & ~E_STRICT & ~E_DEPRECATED

clear_env = no
